<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI UPC - Mis Estudios</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: white; height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #ddd; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .logo-upc { background-color: #ed1c24; color: white; padding: 10px 20px; font-weight: bold; font-size: 20px; display: flex; align-items: center; border-radius: 4px; }
        .top-icons { display: flex; gap: 20px; color: #666; font-size: 13px; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        nav { width: 180px; background-color: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding-top: 20px; }
        .nav-item { padding: 12px 20px; color: #444; font-size: 14px; text-decoration: none; border-left: 4px solid transparent; }
        .nav-item.active { background-color: #fdf2f2; border-left: 4px solid #ed1c24; color: #ed1c24; font-weight: bold; }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .modulo-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .modulo-header { background-color: #5d2a9d; color: white; padding: 12px 20px; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 20px; border-bottom: 1px solid #eee; vertical-align: top; font-size: 14px; }
        .curso-nombre { font-weight: bold; color: #333; margin-bottom: 5px; text-transform: uppercase; }
        .indicator { width: 4px; height: 15px; background-color: #ff4d4d; margin-right: 10px; display: inline-block; }
        .tag-finalizado { background: #fee2e2; color: #b91c1c; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
<header>
