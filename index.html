    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; }
        .wrapper { width: 90%; max-width: 1100px; margin: 30px auto; }
        
        header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 15px; border-bottom: 2px solid #ed1c24; margin-bottom: 25px; }
        header img { height: 45px; }
        header h1 { font-size: 1.8em; color: #4a148c; }

        .modulo-section { background-color: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 30px; }
        
        .modulo-banner { background-color: #4a148c; color: white; padding: 12px 20px; font-weight: bold; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        
        .table-header { display: grid; grid-template-columns: 2.5fr 1fr 2fr 0.5fr; background-color: #f8f9fa; color: #666; font-size: 0.85em; font-weight: 600; padding: 10px 20px; border-bottom: 1px solid #eee; }
        
        .curso-row { display: grid; grid-template-columns: 2.5fr 1fr 2fr 0.5fr; padding: 20px; border-bottom: 1px solid #eee; align-items: start; }
        .curso-row:last-child { border-bottom: none; }
        
        .curso-main { padding-right: 15px; }
        .curso-title { font-weight: bold; color: #333; font-size: 1.05em; margin-bottom: 3px; }
        .curso-id { color: #888; font-size: 0.85em; }
        
        .fecha-cell { color: #555; font-size: 0.9em; }
        
        .horario-cell { border-left: 1px solid #f0f0f0; padding-left: 15px; }
        .horario-item { display: flex; align-items: center; margin-bottom: 8px; }
        .horario-item:last-child { margin-bottom: 0; }
        .horario-indicator { width: 3px; height: 16px; background-color: #ff4d4d; margin-right: 10px; border-radius: 2px; }
        .horario-dia { font-weight: bold; min-width: 35px; color: #222; }
        .horario-time { color: #444; margin-right: 10px; }
        .horario-location { color: #888; font-size: 0.85em; font-style: italic; }

        .status-cell { text-align: center; }
        .status-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; color: white; }
        .status-cursando { background-color: #4caf50; }
        .status-proximo { background-color: #ff9800; }
    </style>
</head>
